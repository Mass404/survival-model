<style>

<body>
<div class="wrap">
  <h1>🗺 世界 / 地点切换</h1>
  <div class="sub">起点 <b>海边</b>。点小地图上相邻地点即可<b>赶路</b>（耗游戏时间，途中天气照常推进）。全世界始终在后台模拟。</div>

        <span style="font-size:12px;color:#9aa6ab">纬度</span>
        <select id="biome"><option value="5">赤道5°</option><option value="40" selected>温带40°</option><option value="62">高纬62°</option></select>
        <span style="font-size:12px;color:#9aa6ab">世界</span>
        <select id="wtype"><option value="continent" selected>大陆</option><option value="ocean">全海洋</option></select>
      </div>
    </div>

<script>
"use strict";
const clamp=(v,a,b)=>v<a?a:v>b?b:v, PI=Math.PI, lerp=(a,b,t)=>a+(b-a)*t;
/* ===== 全局天空 ===== */
let YEAR=365,LAT=40,TILT=23.44,EQDAY=80,SYN=29.53;
const decl=d=>TILT*PI/180*Math.sin(2*PI*(d-EQDAY)/YEAR);
/* 恒星列表(可多颗=双星系统)：每颗{光通量,视日长,相位}。sunF=对每颗高度×光通量求和。
   默认单颗=现有(校准基准)；视日长不同的两颗→白昼/日照拍频(对齐=双日高温+真夜，错开=长昼少夜)。 */
const SUNS=[
  {name:'太阳', flux:1.0, dayLen:1440, phase:0.0},   // 默认单恒星(标定基准)。加一行即成双星系统
];
function sunElev(su,m,d){ const phi=LAT*PI/180,de=decl(d),H=2*PI*(((total/su.dayLen)+su.phase)%1)-PI; return Math.sin(phi)*Math.sin(de)+Math.cos(phi)*Math.cos(de)*Math.cos(H); }
function sunF(m,d){ let s=0; for(const su of SUNS){ const e=sunElev(su,m,d); s+=su.flux*(e>0?e:0); } return s; }  // 各恒星求和(默认单颗=现有)
function halfDay(d){const phi=LAT*PI/180;let x=-Math.tan(phi)*Math.tan(decl(d));x=clamp(x,-1,1);return Math.acos(x)/PI*720;}
const sunriseOf=d=>720-halfDay(d),sunsetOf=d=>720+halfDay(d);
const seasonName=d=>['🌱春','☀️夏','🍂秋','❄️冬'][Math.floor(((d-EQDAY)%YEAR+YEAR)%YEAR*4/YEAR)];
// 夜光：对所有卫星求和(各自周期×相位照度×高度×视亮度) —— 双月夜更亮、各按自己周期盈亏升落
function moonLight(m,d){ let s=0; for(const o of MOONS){ const f=((total/1440/o.period)%1+1)%1, il=(1-Math.cos(2*PI*f))/2, phi=LAT*PI/180, de=decl(d+f*YEAR), H=2*PI*(m/1440)-PI-2*PI*f, e=Math.sin(phi)*Math.sin(de)+Math.cos(phi)*Math.cos(de)*Math.cos(H); s+=o.bright*il*(e>0?e:0); } return s*(1-eclLunar); }   // 满月入地影→月食变暗(用缓存)
const SUNANG=0.267;   // 太阳视半径(度)
function eclipseCover(m,d,lunar){    // 日食(lunar=false:新月遮日,削日照)/月食(true:满月入地影,夜里月变暗)的遮挡比例
  let cov=0; const t=total/1440;     // 倾角inc+交点(交点月≈朔望×0.9215)→只有新/满月恰过黄道面(β≈0)才成食→确定性地稀少
  for(const o of MOONS){ const f=((t/o.period)%1+1)%1, beta=(o.inc||0)*Math.sin(2*PI*(t/(o.period*0.9215))+0.37);
    if(!lunar){ const dlon=360*(f<0.5?f:f-1), sep=Math.hypot(dlon,beta);
      if(sep>=SUNANG+o.angR) continue;
      const c = sep<=Math.abs(o.angR-SUNANG) ? Math.min(1,(o.angR/SUNANG)**2)        // 全食(月≥日)/环食(月<日,按面积比)
                                             : Math.min(1,(SUNANG+o.angR-sep)/(2*SUNANG));  // 偏食:日面被切入深度
      cov=Math.max(cov,c);
    } else { const um=Math.atan(PLANET.radiusKm/o.distKm)*180/PI-SUNANG, dlon=360*(f-0.5), sep=Math.hypot(dlon,beta);  // 地影锥半径(度)
      if(sep>=um+o.angR) continue;
      cov=Math.max(cov, sep<=Math.abs(um-o.angR)?1:clamp((um+o.angR-sep)/(2*o.angR),0,1)); } }
  return cov;
}
/* ===== 行星基本参数（变化极慢→当常量；用来推导 g/标高/直减率/日照 等初始值）===== */
const PLANET={mass:5.972e24, radiusKm:6371, rotationH:24, orbitDays:365, starFlux:1.0, radio:1.0, metallicity:1.0};  // 默认地球。metallicity=星系化学演化代(太阳=1;贫金属第一代→0)
/* 分层周期表 + 核合成起源：33 种单独追踪(有循环);其余并成组(聚合丰度+起源)。
   宇宙丰度由核合成定:BB大爆炸(H/He)·FU恒星聚变(C→Fe峰)·SN超新星/中子星(>Fe重元素,∝metallicity)。 */
const PERIODIC=[  // [组, log10丰度(H=12), 起源]
  ['氢H',12,'BB'],['氦He',11,'BB'],['氧O',8.9,'FU'],['碳C',8.4,'FU'],['氖等轻挥发',8.0,'FU'],
  ['Mg/Si',7.5,'FU'],['Fe峰(Fe/Ni/Cr/Mn)',7.4,'FU'],['硫S',7.1,'FU'],['Na/Ca/K/Al',6.3,'FU'],
  ['惰性气体(Ar/Kr/Xe/Rn)',6.5,'FU'],['卤素(F/Cl/Br/I)',5.5,'FU'],['过渡金属(Ti/Cu/Zn/Mo/Co…)',4.3,'FU'],
  ['碱金属碱土次要',3.0,'FU'],['稀土REE',2.2,'SN'],['重金属(Sn/Pb/Ag/Au/Hg)',2.0,'SN'],['放射性(U/Th)',0.3,'SN']];
const metalScale=o=>o==='BB'?1:o==='SN'?Math.pow(PLANET.metallicity,1.3):PLANET.metallicity;  // 重元素(SN)对代数更敏感
const HEAVY=new Set([9,12,13,14,15,20,23,24]);  // 超新星产的稀有重元素(Cu/Sn/Pb/Ag/Au/Hg/U/Th):丰度∝金属丰度→贫金属行星无矿无核燃料
const _G=6.674e-11,_Rgas=8.314,_Mair=0.029,_Tatm=273;        // 物理常量 + 大气代表温度
const pR=PLANET.radiusKm*1000;
const pG=_G*PLANET.mass/(pR*pR);                              // 重力 g=GM/R²
const pH=_Rgas*_Tatm/(_Mair*pG);                             // 大气标高 H=RT/(M_air·g)→气压 e^(-z/H)
const pLapse=6.5*(pG/9.8)/1000;                              // 气温直减率 ∝ g (°C/m)
const pInsol=PLANET.starFlux;                                // 太阳常数倍率(∝恒星光度/轨道距离²)
const pVesc=Math.sqrt(2*pG*pR), pDensity=PLANET.mass/(4/3*PI*pR**3), pKmDeg=2*PI*pR/1000/360;  // 逃逸速度/密度/每度km(读出)
/* ===== 磁场(地磁发电机): B ∝ 核活动(内部热)×自转。偶极→磁极强。耦合:大气屏蔽/逃逸·地表辐射·极光。与火山同根 ===== */
const magBsurf=50, magBcrit=20, magRot=24/PLANET.rotationH;   // 参考地表场μT / 屏蔽住太阳风所需场 / 自转因子(越快越强)
let radioFuel=PLANET.radio*metalScale('SN');                   // 放射性燃料(U/Th/K)∝金属丰度(超新星产物),按地质时间衰变；贫金属→几乎无→冷核
let coreActivity=Math.min(1, radioFuel/(6371/PLANET.radiusKm));// 核对流活动 = 放射成因热/散热(∝1/R)：地球≈1稳定;小行星散热快→偏低;贫铀→偏低

const magField=()=>magBsurf*coreActivity*magRot;              // 地表磁场强度 μT
const magDipole=lat=>{const s=Math.sin(lat*PI/180);return magField()*Math.sqrt(1+3*s*s)/2;};  // 偶极:磁极强、赤道弱
const magShield=()=>Math.min(1,magField()/magBcrit);          // 大气屏蔽率(强场→1=不漏)
function radiationAt(r){ const s=magShield()*(1-0.6*Math.abs(Math.sin(LAT*PI/180))), cosmic=Math.max(0.02,(1-s))*Math.exp(-Patm(r.elev||0));  // 宇宙/太阳:磁极funnel高+薄气高
  const uth=r.dis?(r.dis[23]+r.dis[24]+r.dep[23]+r.dep[24]):0, geo=0.2*uth+1.5*(r.radon||0); return cosmic+geo; }  // +地质:U/Th岩石本底 + 氡气(洞穴积聚)
const auroraStrength=()=>Math.max(0,(Math.abs(LAT)-50)/40)*Math.min(1,magField()/magBcrit);  // 高磁纬(>50°)+有场channel→极光
/* ===== 模型常量（与 C#/hub3 同构）===== */
const LightPeak=100,MoonPeak=4,AG=0.10,AL=0.007,SG=0.0065,SL=0.00007,GF=-16,LAPSE=pLapse;  // 直减率由 g 推导
/* 气候纬度基准：高纬冷/低纬暖(年均辐射平衡推导,锚定40°N=GF→既有标定不变)。随大陆漂移 LAT 改→气候带改写 */
const eqTemp=(lat,dc)=>30-65*(1-Math.cos((lat-dc)*0.9*PI/180));
const annualMeanEqT=lat=>{let s=0;for(let d=0;d<YEAR;d++)s+=eqTemp(lat,decl(d));return s/YEAR;};
let CLIMBASE=GF;
const updClimBase=()=>{CLIMBASE=GF+(annualMeanEqT(LAT)-annualMeanEqT(40));_ringDay=-1;};  // 慢量,只在LAT变时重算(并失效环影缓存)
const EvapK=0.035,VaporMax=45,CondK=0.0045,DispK=0.001,RainK=0.015,RainHi=42,RainLo=12;
const SnowTemp=1.0,MeltTemp=0.0,MeltK=0.006,VDIFF=0.015,SnowCap=600;
// 水汽温室反馈(Clausius-Clapeyron:暖→饱和水汽压↑→水汽↑→温室↑) + 云反照率(暖→云↑→反射阳光↓→致冷,与水汽打擂台)
const cVapGH=0.045, Vref=14, cVsatT=16, cCloudAlb=0.15;   // cVsatT:饱和水汽温敏(每16℃翻倍≈4.4%/℃);锚定基线水汽Vref→默认地球不变
// 土壤发育/地下水:soilDepth风化造土÷径流剥土;GW深渗补给→旱季基流。pedK造土 erodK剥土 gwRech补给 gwBase基流
const pedWeatherK=2e-4, pedErodeK=8e-5, soilCapBase=18, soilCapPerM=22, gwRechK=0.04, gwBaseK=0.006, gwCap=400;
const csun=C=>1-0.8*C/100,ccool=C=>1-0.6*C/100;
const seaTemp=d=>13+6*Math.sin(2*PI*(d-110)/YEAR);
/* 潮汐：引力梯度 ∝ M/d³ → 太阳潮自动=月亮潮×0.46；月+日半日潮相加 → 大/小潮涌现 */
/* 卫星列表(可多颗,各自周期)：由 质量/距离 推导 潮汐力∝M/d³ 与 视亮度∝半径²/d²(半径∝M^(1/3)) */
const MOONS=[
  {name:'月', mass:7.342e22, distKm:384400, period:29.53, inc:5.14},   // 默认单卫星(inc=轨道倾角,日月食稀有性来源)。加一行即成多卫星系统
];
const _Ksun=1.989e30/Math.pow(1.496e11,3);
MOONS.forEach(o=>{ o.d=o.distKm*1000; o.K=o.mass/Math.pow(o.d,3); o.glow=Math.pow(o.mass,2/3)/(o.d*o.d);
  o.radiusKm=1737*Math.cbrt(o.mass/7.342e22); o.angR=Math.atan(o.radiusKm/o.distKm)*180/PI; });   // 半径∝质量^⅓;视半径(度)→日月食几何
const _ampScale=0.5/MOONS[0].K, _glowScale=4/MOONS[0].glow;    // 标定:主月半日潮振幅≈0.5m、满月夜光≈4
MOONS.forEach(o=>{ o.amp=o.K*_ampScale; o.bright=o.glow*_glowScale; });
/* 行星环(土星式):赤道面粒子盘。inner/outer=内外缘(行星半径单位),opacity=遮光,glow=反照夜光标定。null=无环。
   两个确定性效应,都挂在已有赤纬上:①环影=环在冬半球投影削日照→冬季深寒(分点边缘对日→归零,δ翻号→换半球);②环光=被照亮的环反射到夜半球(夏半球更亮,像月光)。 */
const RING=null;   // 默认地球:无环。土星式环示例:{inner:1.2, outer:2.5, opacity:0.7, glow:9}
function ringShadow(latRad,deRad){    // 该纬度当日日照被环影削减的比例(0~opacity);几何积分,确定性
  if(!RING) return 0; const sz=Math.sin(deRad); if(Math.abs(sz)<1e-3) return 0;   // 分点:环侧对太阳→影成赤道细线≈0
  const sx=Math.cos(deRad); let lit=0,blk=0;
  for(let k=0;k<24;k++){ const lam=(k+0.5)/24*2*PI;
    const px=Math.cos(latRad)*Math.cos(lam), py=Math.cos(latRad)*Math.sin(lam), pz=Math.sin(latRad);
    const mu=px*sx+pz*sz; if(mu<=0) continue; lit+=mu;          // 白昼受照才算
    const t=-pz/sz; if(t<=0) continue;                          // 射线朝太阳侧穿过环面(t>0→冬半球)
    const rho=Math.hypot(px+t*sx, py); if(rho>=RING.inner&&rho<=RING.outer) blk+=mu*RING.opacity; }
  return lit>0?blk/lit:0;
}
function ringShine(latRad,deRad){     // 环反射夜光(接月光量纲):∝环被照亮程度|sinδ|,夏半球看到被照面更多
  if(!RING) return 0; return RING.glow*Math.abs(Math.sin(deRad))*((latRad*deRad>0)?1:0.4);
}
const tAs=_Ksun*_ampScale;                                     // 太阳半日潮振幅(同一标定)
const tSpring=2*(tAs+MOONS.reduce((s,o)=>s+o.amp,0));          // 全部连珠时的最大潮范围
const phaseOf=o=>((total/1440/o.period)%1+1)%1;                // 该卫星当前月相(各自周期)
function tideLevel(tot){ const mod=((tot%1440)+1440)%1440, Hs=2*PI*(mod/1440)-PI; let s=tAs*Math.cos(2*Hs);
  for(const o of MOONS){ const f=((tot/1440/o.period)%1+1)%1, Hm=Hs-2*PI*f; s+=o.amp*Math.cos(2*Hm); } return s; }  // 各卫星半日潮(各自周期)+太阳 求和
function tideRange(){ let lo=9,hi=-9, base=total-(total%1440); for(let t=0;t<1440;t+=20){const v=tideLevel(base+t); if(v<lo)lo=v; if(v>hi)hi=v;} return hi-lo; }  // 多卫星拍频→数值采样当日潮差
const tideExposed=()=>clamp(-tideLevel(total)/(tSpring/2),0,1);   // 潮间带露出比例 0..1
/* 地质（C# Geology 镜像，按"地质年"推进）：张弛攒压→喷发·永久改地形·抬升vs侵蚀平衡·火山灰致冷 */
const gFlux=1.0,gStr=18,gOverK=0.012,gPoreK=6,gLava=1.0,gAsh=0.03,gEroK=0.0005,gSedDown=0.7,gAeroDec=0.55,gAeroDim=0.25,gLithSw=300,gLithThr=30,gLithFrac=0.02;
let VOLC='mountain';   // 火山口=最高陆地区(随世界类型动态:大陆→山顶,水世界→火山岛)
/* 板块构造（C# Planet 镜像）：地幔对流→板块速度→汇聚度→活动度/俯冲/漂移。无随机 */
const tConvCells=2,tPlateV=1.0,tDriftLat=-0.015,tPatchLon=125;
const tVplate=lon=>tPlateV*Math.sin(2*Math.PI*tConvCells*lon/360);
const tConverg=lon=>{const h=0.5;return -(tVplate(lon+h)-tVplate(lon-h))/(2*h);};
const tActivity=lon=>Math.max(0.3,0.3+50*Math.abs(tConverg(lon)));

  { const veil=(r.skyDim||geoSkyDim||0); if(veil>0.02){   // 遮日幕(火山灰+尘暴)：尘多偏土黄、灰多偏褐
      const dusty=wDustDimK*(r.dustAir||0)>0.08; sx.fillStyle=dusty?`rgba(175,150,95,${Math.min(0.6,veil*0.85)})`:`rgba(120,95,70,${Math.min(0.6,veil*0.85)})`; sx.fillRect(0,0,W,H); } }
}
/* ===== 小地图 ===== */
let nodeHit=[];
function drawMini(){
  const W=M.w,H=M.h; mx.clearRect(0,0,W,H); nodeHit=[];
  mx.strokeStyle='#33415c';mx.lineWidth=2;
  for(const [a,b] of ROUTES){const A=byk[a],B=byk[b];mx.beginPath();mx.moveTo(A.mx*W,A.my*H);mx.lineTo(B.mx*W,B.my*H);mx.stroke();}
  const nb=new Set(neighbors(player).map(n=>n[0]));
  for(const r of locs){const x=r.mx*W,y=r.my*H,here=r.key===player,adj=nb.has(r.key);
    mx.fillStyle=here?'#ffd66a':adj?'#4c8dff':'#2b3447'; mx.strokeStyle=here?'#fff3c4':'#1b2331';mx.lineWidth=2;
    mx.beginPath();mx.arc(x,y,here?11:9,0,7);mx.fill();mx.stroke();
    mx.fillStyle=here?'#ffd66a':(adj?'#cfe0ff':'#8a96ab');mx.font=(here?'bold ':'')+'11px sans-serif';mx.textAlign='center';
    mx.fillText(r.name,x,y-14);
    if(here){mx.fillStyle='#1b1402';mx.font='9px sans-serif';mx.fillText('你',x,y+3);}
    nodeHit.push({key:r.key,x,y,r:12,adj});}
  mx.textAlign='left';
}
mc.addEventListener('click',e=>{const rect=mc.getBoundingClientRect(),x=e.clientX-rect.left,y=e.clientY-rect.top;
  for(const n of nodeHit){ if(n.adj&&Math.hypot(x-n.x,y-n.y)<=n.r+3){ travelTo(n.key); break; } }});
/* ===== HUD / 表 ===== */
const pad2=n=>String(Math.floor(n)).padStart(2,'0');
function wxOf(r){ if(r.cave)return '🕳 恒温'; return r.storm?(r.Tair<=SnowTemp?'❄️ 雪':'🌧 雨'):((r.C>45)?'☁️ 阴':(sunF(curMin(),curDOY())>0?'☀️ 晴':'🌙 夜')); }
function airOf(r){ return badAir(r)?('☠️CO₂'+r.co2.toFixed(1)+'%'):(thinAir(r)?('🫁稀薄O₂'+r.o2.toFixed(0)+'%'):('🌬O₂'+r.o2.toFixed(0)+'%')); }
function tideHud(){ const lv=tideLevel(total), rising=lv>tideLevel(total-2), rng=tideRange(), sp=rng>0.65*tSpring?'大潮':rng<0.42*tSpring?'小潮':'中潮';
  return '🌊潮 '+(rising?'↑涨':'↓落')+' '+(lv>=0?'+':'')+lv.toFixed(2)+'m·'+sp+'(差'+rng.toFixed(1)+'m)'; }
function windHud(r){ if(r.cave)return '🕳静风'; const w=r.wind||0, fl=feelsLike(r.Tair,w);
  const dusty=wDustDimK*(r.dustAir||0)>0.08;
  return '🌬'+w.toFixed(0)+' '+windCause(r)+(fl<r.Tair-1.5?'(体感'+fl.toFixed(0)+'°)':'')+(dusty?' · 🌫尘暴':''); }
function iceTag(r){ let s=''; if((r.glacier||0)>20)s+=' · 🧊冰川'+(r.glacier).toFixed(0); if(!r.cave&&!r.sea&&r.Tg<0)s+=' · ❄冻土'; if(r.sea&&r.Tair<iSeaFreeze)s+=' · 🧊海冰'; return s; }
function stormTag(r){ return (r.charge||0)>0.65 ? (r.storm>0.5?' · ⚡雷暴':' · ⚡旱雷') : ''; }
function soilTag(r){ if(r.sea||r.cave) return ''; let s=' · 🟫土'+(r.soilDepth||1).toFixed(2); if((r.GW||0)>40) s+=' 💧地下水'+Math.round(r.GW); return s; }   // 土壤发育+含水层
function bioTag(r){ let s=''; const vent=(r.hvent||0)*coreActivity;   // 海底热液 + 前生命摇篮就绪度
  if(vent>0.05) s+=' · 🌋海底热液'+(r.redu>0.05?'(还原流体ΔG'+(freeEnergy(r)*100).toFixed(0)+'%)':'');
  const cr=cradleIndex(r); if(cr>0.08) s+=' · 🧬生命摇篮'+(cr*100).toFixed(0)+'%';
  if((r.prot||0)>0.3) s+=' · 🧪蛋白质'+(r.prot).toFixed(1)+((r.org||0)>0.3?'(单体'+r.org.toFixed(1)+')':''); else if((r.org||0)>0.5) s+=' · 🧪有机单体'+r.org.toFixed(1);
  if((r.repl||0)>0.05){ const a=r.rAuto||0; s+=' · 🦠'+(a>0.5?'化能自养菌':(a>0.15?'兼养':'异养复制子'))+(r.repl).toFixed(1)+'(最适'+(r.rTopt||0).toFixed(0)+'℃'+(a>0.1?'·自养'+(a*100).toFixed(0)+'%':'')+')'; } return s; }
function eclTag(){ const m=curMin(),d=curDOY(); const s=eclSolar,l=eclLunar;   // 日食仅白昼可见(用缓存)
  if(s>0.02&&sunF(m,d)>0) return ' · 🌑'+(s>0.99?'全日食':'日食'+(s*100).toFixed(0)+'%');
  if(l>0.02&&sunF(m,d)<=0) return ' · 🌑'+(l>0.95?'月全食(血月)':'月食'+(l*100).toFixed(0)+'%'); return ''; }
function localPressure(r){ const belt=-20*Math.cos(2*Math.PI*Math.abs(LAT)/60), th=2.0*(r.Tair-13); return 1013+belt-th-(r.elev||0)*0.11; }  // 气压带+热力异常(暖→低)-海拔
function pressTag(r){ if(r.cave)return''; const p=localPressure(r); return ' · 🌡'+p.toFixed(0)+'hPa('+(p>1016?'高压晴':p<1009?'低压阴雨':'平')+')'; }
function sedTag(r){ return (r.sediment||0)>3 ? ' · 🪨沉积'+(r.sediment).toFixed(0)+'(固结→'+classifySed(r)+')' : ''; }
function waterOf(r){ if(r.cave)return '🕳 滴水'; if(r.sea)return '🌊 海·咸';
  const q=drinkable(r)?'🟢可饮':(salinity(r)<0.6?'🟡微咸':'🔴咸'); const dom=domMineral(r);
  return q+(dom?('·'+dom):'')+(hasCrust(r)?' 盐壳':''); }
function updateUI(){
  const r=byk[player],m=curMin(),d=curDOY();
  document.getElementById('hLoc').textContent=(traveling?('🚶 → '+byk[traveling.to].name):r.name);
  document.getElementById('hTime').textContent='第'+(Math.floor(total/1440)+1)+'天 '+pad2(m/60)+':'+pad2(m%60)+' · '+seasonName(d);
  document.getElementById('hWx').textContent=wxOf(r)+' · '+r.Tair.toFixed(0)+'°C · '+(r.cave?'🕳恒温':(r.sea?'🌊海水(咸·不可饮)':(drinkable(r)?'🟢淡水可饮':'🔴水偏咸')))+' · '+airOf(r)+(r.sea?' · '+tideHud()+' · 🌊'+(r.wave||0).toFixed(1)+'m'+((r.wave||0)>1.5?'(拍岸)':''):'')+' · '+windHud(r)+pressTag(r)+sedTag(r)+iceTag(r)+stormTag(r)+eclTag()+soilTag(r)+bioTag(r);
  { const v=byk[VOLC], mp=clamp(magmaP/(gStr+gOverK*v.elev),0,1);
    const gh=cGhouse*(globalCO2-CO2ref);
    document.getElementById('hGeo').textContent='🌍g'+pG.toFixed(1)+' Z'+PLANET.metallicity.toFixed(1)+' · 🏔 '+v.name+' '+v.elev.toFixed(0)+'m · 🌋岩浆'+(mp*100).toFixed(0)+'%'+(geoSkyDim>0.05?' · 🌫灰幕':'')+' · CO₂ '+globalCO2.toFixed(2)+'%(温室'+(gh>=0?'+':'')+gh.toFixed(1)+'°)'+' · 🌐'+tRegime(tPatchLon)+' 纬'+LAT.toFixed(0)+'°'+' · 🧲'+magField().toFixed(0)+'μT ☢'+radiationAt(byk[player]).toFixed(2)+(RING?(' · 🪐环'+(curRingSh>0.02?'影−'+(curRingSh*100).toFixed(0)+'%日照':(curRingShine>0.5?'光'+curRingShine.toFixed(1):'侧'))):'')+' · 🜁气'+atmMass.toFixed(2)+'atm'+(Math.abs(seaLevel)>1?' · 🌊海平面'+(seaLevel>0?'+':'')+seaLevel.toFixed(0)+'m':'')+(Math.abs(TILT-23.44)>0.2?' · 倾角'+TILT.toFixed(1)+'°':'')+' · '+lastGeo; }
  document.getElementById('travel').style.display=traveling?'flex':'none';
  if(traveling)document.getElementById('travel').textContent='🚶 赶往 '+byk[traveling.to].name+'… 剩 '+traveling.left+' 分钟';
  let html=''; for(const r2 of locs){ html+=`<tr class="${r2.key===player?'here':''}"><td>${r2.name}</td><td>${r2.Tair.toFixed(0)}°</td><td>${wxOf(r2)}${badAir(r2)?' ☠️':(thinAir(r2)?' 🫁':'')}</td><td>${waterOf(r2)}</td></tr>`; }
  document.getElementById('tbody').innerHTML=html;
  const ore=oresOf(byk[player]); const nb=neighbors(player);
  document.getElementById('go').innerHTML=(ore?('⛏ 本地矿藏：'+ore+'<br>'):'')+'可前往：'+nb.map(n=>`<b data-k="${n[0]}">${byk[n[0]].name}(${n[1]}分)</b>`).join(' · ');
  document.querySelectorAll('#go b').forEach(b=>b.onclick=()=>travelTo(b.dataset.k));
}
let last=performance.now();
function loop(now){const dt=Math.min((now-last)/1000,0.1);last=now;frame++;if(eruptFx>0)eruptFx--;step(dt);
  if((byk[player].lightning||0)>0.003){boltFx=6;boltSeed=frame;} if(boltFx>0)boltFx--;
  drawScene();drawMini();updateUI();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
/* ===== 控件 ===== */
document.getElementById('bPause').onclick=function(){paused=!paused;this.textContent=paused?'▶':'⏸';};
document.querySelectorAll('.spd').forEach(b=>b.onclick=()=>{speed=+b.dataset.s;document.querySelectorAll('.spd').forEach(x=>x.classList.remove('on'));b.classList.add('on');});
document.getElementById('biome').onchange=e=>{LAT=+e.target.value;resetAll();};
document.getElementById('wtype').onchange=e=>{WORLDTYPE=e.target.value;resetAll();};
document.getElementById('bGeo').onclick=()=>{ for(let i=0;i<90;i++){ geoYear(); if(eruptFx>200) break; } };   // 快进到下次喷发：山长高+灰幕致冷
</script>
