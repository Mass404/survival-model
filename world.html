<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>生存模拟 · 世界 / 地点切换</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0d1017;color:#e8ecf4;font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
       min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;}
  h1{font-size:18px;font-weight:600;margin-bottom:4px;}
  .sub{font-size:12px;color:#8a96ab;margin-bottom:12px;text-align:center;}
  .wrap{width:min(860px,100%);}
  .scene-box{position:relative;border-radius:14px;overflow:hidden;border:1px solid #232b3a;}
  #scene{display:block;width:100%;height:400px;}
  .hud{position:absolute;top:12px;left:14px;text-shadow:0 1px 5px rgba(0,0,0,.7);pointer-events:none;}
  .hud .loc{font-size:26px;font-weight:800;line-height:1;}
  .hud .time{font-size:14px;margin-top:3px;}
  .hud .wx{font-size:13px;margin-top:4px;display:inline-block;background:rgba(0,0,0,.4);padding:2px 9px;border-radius:999px;}
  .travel{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(8,11,17,.55);font-size:18px;font-weight:700;}
  .cols{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;}
  .panel{background:#141a25;border:1px solid #232b3a;border-radius:12px;padding:12px 14px;flex:1;min-width:260px;}
  .panel h3{font-size:13px;color:#9aa6ab;margin-bottom:8px;font-weight:600;}
  #mini{display:block;width:100%;height:230px;cursor:pointer;}
  .ctrls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px;}
  button{background:#222c3d;color:#e8ecf4;border:1px solid #2f3a4d;border-radius:9px;padding:7px 11px;font-size:13px;cursor:pointer;font-weight:600;}
  button:hover{border-color:#4c8dff;} button.on{background:#3a6fd6;border-color:#4c8dff;}
  select{background:#222c3d;color:#e8ecf4;border:1px solid #2f3a4d;border-radius:9px;padding:6px 9px;font-size:13px;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  td,th{padding:3px 5px;text-align:right;border-bottom:1px solid #1d2533;} td:first-child,th:first-child{text-align:left;}
  th{color:#8a96ab;font-weight:600;} tr.here td{color:#ffd66a;}
  .go{font-size:12px;color:#8a96ab;margin-top:6px;}
  .go b{color:#cfe0ff;cursor:pointer;text-decoration:underline;}
</style>
</head>
<body>
<div class="wrap">
  <h1>🗺 世界 / 地点切换</h1>
  <div class="sub">起点 <b>海边</b>。点小地图上相邻地点即可<b>赶路</b>（耗游戏时间，途中天气照常推进）。全世界始终在后台模拟。</div>

  <div class="scene-box">
    <canvas id="scene"></canvas>
    <div class="hud">
      <div class="loc" id="hLoc">海边</div>

      <div class="wx" id="hGeo" style="font-size:12px;color:#c9b08a"></div>
    </div>
    <div class="travel" id="travel">🚶 赶路中…</div>
  </div>

  <div class="cols">
    <div class="panel" style="flex:1.1">
      <h3>🧭 地图（点相邻地点出发）</h3>
      <canvas id="mini"></canvas>
      <div class="go" id="go"></div>
    </div>
    <div class="panel">
      <h3>🌍 各地实况</h3>
      <table><thead><tr><th>地点</th><th>气温</th><th>天气</th><th>水/水质</th></tr></thead><tbody id="tbody"></tbody></table>
      <div class="ctrls">
        <button id="bPause">⏸</button>
        <button class="spd" data-kind="min" data-rate="60">小时</button>
        <button class="spd on" data-kind="min" data-rate="1440">天</button>
        <button class="spd" data-kind="min" data-rate="43200">月</button>
        <button class="spd" data-kind="min" data-rate="525600">年</button>
        <button class="spd" data-kind="geo" data-rate="60">10年</button>
        <button class="spd" data-kind="geo" data-rate="240">百年</button>
        <button class="spd" data-kind="geo" data-rate="900">千年</button>
        <button class="spd" data-kind="geo" data-rate="2400">万年</button>
        <button id="bGeo" title="快进地质演化~40年：火山攒压可能喷发、山体长高、灰幕致冷">🌋 地质快进</button>
        <button id="bPhylo" title="查看全世界生物的分化谱系(系统发生树)">🌳 谱系树</button>
        <span style="font-size:12px;color:#9aa6ab">纬度</span>
        <select id="biome"><option value="5">赤道5°</option><option value="40" selected>温带40°</option><option value="62">高纬62°</option></select>
        <span style="font-size:12px;color:#9aa6ab">世界</span>
        <select id="wtype"><option value="continent" selected>大陆</option><option value="ocean">全海洋</option></select>
      </div>
    </div>
  </div>
</div>

<div id="phyloOverlay" style="display:none;position:fixed;inset:0;background:rgba(8,11,17,.97);z-index:50;padding:18px;overflow:auto;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;max-width:1100px;margin-left:auto;margin-right:auto;">
    <div><h1 style="font-size:17px;">🌳 生命分化谱系 · 系统发生树</h1>
      <div class="sub" style="margin:2px 0 0;text-align:left;">横轴=地质时间(ky)　纵轴=支系　实线=现存(颜色按生态位/体型)　灰虚线=已灭绝　分叉=物种形成</div></div>
    <button id="bPhyloClose">✕ 关闭</button>
  </div>
  <div style="max-width:1100px;margin:0 auto;">
    <canvas id="phyloCanvas" style="display:block;width:100%;height:440px;background:#0a0d13;border:1px solid #232b3a;border-radius:10px;"></canvas>
    <div id="phyloTip" style="display:none;position:fixed;z-index:60;background:#161d29;border:1px solid #3a4659;border-radius:8px;padding:8px 11px;font-size:12.5px;line-height:1.65;color:#e8ecf4;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.55);max-width:240px;"></div>
    <div id="phyloStat" style="font-size:12px;color:#9aa6ab;margin:8px 2px;"></div>
    <div class="cols">
      <div class="panel"><h3>🧬 现存物种（按地点）</h3><div id="phyloSpecies" style="font-size:12px;line-height:1.7;"></div></div>
      <div class="panel"><h3>📜 演化事件（最近）</h3><div id="phyloEvents" style="font-size:12px;line-height:1.7;"></div></div>
    </div>
  </div>
</div>

<script>
"use strict";
const clamp=(v,a,b)=>v<a?a:v>b?b:v, PI=Math.PI, lerp=(a,b,t)=>a+(b-a)*t;
/* ===== 全局天空 ===== */
let YEAR=365,LAT=40,TILT=23.44,EQDAY=80,SYN=29.53;
const decl=d=>TILT*PI/180*Math.sin(2*PI*(d-EQDAY)/YEAR);
/* 恒星列表(可多颗=双星系统)：每颗{光通量,视日长,相位}。sunF=对每颗高度×光通量求和。
   默认单颗=现有(校准基准)；视日长不同的两颗→白昼/日照拍频(对齐=双日高温+真夜，错开=长昼少夜)。 */
const SUNS=[
  {name:'太阳', flux:1.0, dayLen:1440, phase:0.0},   // 默认单恒星(标定基准)。加一行即成双星系统
];
function sunElev(su,m,d){ const phi=LAT*PI/180,de=decl(d),H=2*PI*(((total/su.dayLen)+su.phase)%1)-PI; return Math.sin(phi)*Math.sin(de)+Math.cos(phi)*Math.cos(de)*Math.cos(H); }
function sunF(m,d){ let s=0; for(const su of SUNS){ const e=sunElev(su,m,d); s+=su.flux*(e>0?e:0); } return s; }  // 各恒星求和(默认单颗=现有)
function halfDay(d){const phi=LAT*PI/180;let x=-Math.tan(phi)*Math.tan(decl(d));x=clamp(x,-1,1);return Math.acos(x)/PI*720;}
const sunriseOf=d=>720-halfDay(d),sunsetOf=d=>720+halfDay(d);
const seasonName=d=>['🌱春','☀️夏','🍂秋','❄️冬'][Math.floor(((d-EQDAY)%YEAR+YEAR)%YEAR*4/YEAR)];
// 夜光：对所有卫星求和(各自周期×相位照度×高度×视亮度) —— 双月夜更亮、各按自己周期盈亏升落
function moonLight(m,d){ let s=0; for(const o of MOONS){ const f=((total/1440/o.period)%1+1)%1, il=(1-Math.cos(2*PI*f))/2, phi=LAT*PI/180, de=decl(d+f*YEAR), H=2*PI*(m/1440)-PI-2*PI*f, e=Math.sin(phi)*Math.sin(de)+Math.cos(phi)*Math.cos(de)*Math.cos(H); s+=o.bright*il*(e>0?e:0); } return s*(1-eclLunar); }   // 满月入地影→月食变暗(用缓存)
const SUNANG=0.267;   // 太阳视半径(度)
function eclipseCover(m,d,lunar){    // 日食(lunar=false:新月遮日,削日照)/月食(true:满月入地影,夜里月变暗)的遮挡比例
  let cov=0; const t=total/1440;     // 倾角inc+交点(交点月≈朔望×0.9215)→只有新/满月恰过黄道面(β≈0)才成食→确定性地稀少
  for(const o of MOONS){ const f=((t/o.period)%1+1)%1, beta=(o.inc||0)*Math.sin(2*PI*(t/(o.period*0.9215))+0.37);
    if(!lunar){ const dlon=360*(f<0.5?f:f-1), sep=Math.hypot(dlon,beta);
      if(sep>=SUNANG+o.angR) continue;
      const c = sep<=Math.abs(o.angR-SUNANG) ? Math.min(1,(o.angR/SUNANG)**2)        // 全食(月≥日)/环食(月<日,按面积比)
                                             : Math.min(1,(SUNANG+o.angR-sep)/(2*SUNANG));  // 偏食:日面被切入深度
      cov=Math.max(cov,c);
    } else { const um=Math.atan(PLANET.radiusKm/o.distKm)*180/PI-SUNANG, dlon=360*(f-0.5), sep=Math.hypot(dlon,beta);  // 地影锥半径(度)
      if(sep>=um+o.angR) continue;
      cov=Math.max(cov, sep<=Math.abs(um-o.angR)?1:clamp((um+o.angR-sep)/(2*o.angR),0,1)); } }
  return cov;
}
/* ===== 行星基本参数（变化极慢→当常量；用来推导 g/标高/直减率/日照 等初始值）===== */
const PLANET={mass:5.972e24, radiusKm:6371, rotationH:24, orbitDays:365, starFlux:1.0, radio:1.0, metallicity:1.0};  // 默认地球。metallicity=星系化学演化代(太阳=1;贫金属第一代→0)
/* 分层周期表 + 核合成起源：33 种单独追踪(有循环);其余并成组(聚合丰度+起源)。
   宇宙丰度由核合成定:BB大爆炸(H/He)·FU恒星聚变(C→Fe峰)·SN超新星/中子星(>Fe重元素,∝metallicity)。 */
const PERIODIC=[  // [组, log10丰度(H=12), 起源]
  ['氢H',12,'BB'],['氦He',11,'BB'],['氧O',8.9,'FU'],['碳C',8.4,'FU'],['氖等轻挥发',8.0,'FU'],
  ['Mg/Si',7.5,'FU'],['Fe峰(Fe/Ni/Cr/Mn)',7.4,'FU'],['硫S',7.1,'FU'],['Na/Ca/K/Al',6.3,'FU'],
  ['惰性气体(Ar/Kr/Xe/Rn)',6.5,'FU'],['卤素(F/Cl/Br/I)',5.5,'FU'],['过渡金属(Ti/Cu/Zn/Mo/Co…)',4.3,'FU'],
  ['碱金属碱土次要',3.0,'FU'],['稀土REE',2.2,'SN'],['重金属(Sn/Pb/Ag/Au/Hg)',2.0,'SN'],['放射性(U/Th)',0.3,'SN']];
const metalScale=o=>o==='BB'?1:o==='SN'?Math.pow(PLANET.metallicity,1.3):PLANET.metallicity;  // 重元素(SN)对代数更敏感
const HEAVY=new Set([9,12,13,14,15,20,23,24]);  // 超新星产的稀有重元素(Cu/Sn/Pb/Ag/Au/Hg/U/Th):丰度∝金属丰度→贫金属行星无矿无核燃料
const _G=6.674e-11,_Rgas=8.314,_Mair=0.029,_Tatm=273;        // 物理常量 + 大气代表温度
const pR=PLANET.radiusKm*1000;
const pG=_G*PLANET.mass/(pR*pR);                              // 重力 g=GM/R²
const pH=_Rgas*_Tatm/(_Mair*pG);                             // 大气标高 H=RT/(M_air·g)→气压 e^(-z/H)
const pLapse=6.5*(pG/9.8)/1000;                              // 气温直减率 ∝ g (°C/m)
const pInsol=PLANET.starFlux;                                // 太阳常数倍率(∝恒星光度/轨道距离²)
const pVesc=Math.sqrt(2*pG*pR), pDensity=PLANET.mass/(4/3*PI*pR**3), pKmDeg=2*PI*pR/1000/360;  // 逃逸速度/密度/每度km(读出)
/* ===== 磁场(地磁发电机): B ∝ 核活动(内部热)×自转。偶极→磁极强。耦合:大气屏蔽/逃逸·地表辐射·极光。与火山同根 ===== */
const magBsurf=50, magBcrit=20, magRot=24/PLANET.rotationH;   // 参考地表场μT / 屏蔽住太阳风所需场 / 自转因子(越快越强)
let radioFuel=PLANET.radio*metalScale('SN');                   // 放射性燃料(U/Th/K)∝金属丰度(超新星产物),按地质时间衰变；贫金属→几乎无→冷核
let coreActivity=Math.min(1, radioFuel/(6371/PLANET.radiusKm));// 核对流活动 = 放射成因热/散热(∝1/R)：地球≈1稳定;小行星散热快→偏低;贫铀→偏低

const magField=()=>magBsurf*coreActivity*magRot;              // 地表磁场强度 μT
const magDipole=lat=>{const s=Math.sin(lat*PI/180);return magField()*Math.sqrt(1+3*s*s)/2;};  // 偶极:磁极强、赤道弱
const magShield=()=>Math.min(1,magField()/magBcrit);          // 大气屏蔽率(强场→1=不漏)
function radiationAt(r){ const s=magShield()*(1-0.6*Math.abs(Math.sin(LAT*PI/180))), cosmic=Math.max(0.02,(1-s))*Math.exp(-Patm(r.elev||0));  // 宇宙/太阳:磁极funnel高+薄气高
  const uth=r.dis?(r.dis[23]+r.dis[24]+r.dep[23]+r.dep[24]):0, geo=0.2*uth+1.5*(r.radon||0); return cosmic+geo; }  // +地质:U/Th岩石本底 + 氡气(洞穴积聚)
const auroraStrength=()=>Math.max(0,(Math.abs(LAT)-50)/40)*Math.min(1,magField()/magBcrit);  // 高磁纬(>50°)+有场channel→极光
/* ===== 模型常量（与 C#/hub3 同构）===== */
const LightPeak=100,MoonPeak=4,AG=0.10,AL=0.007,SG=0.0065,SL=0.00007,GF=-16,LAPSE=pLapse;  // 直减率由 g 推导
/* 气候纬度基准：高纬冷/低纬暖(年均辐射平衡推导,锚定40°N=GF→既有标定不变)。随大陆漂移 LAT 改→气候带改写 */
const eqTemp=(lat,dc)=>30-65*(1-Math.cos((lat-dc)*0.9*PI/180));
const annualMeanEqT=lat=>{let s=0;for(let d=0;d<YEAR;d++)s+=eqTemp(lat,decl(d));return s/YEAR;};
let CLIMBASE=GF;
const updClimBase=()=>{CLIMBASE=GF+(annualMeanEqT(LAT)-annualMeanEqT(40));_ringDay=-1;};  // 慢量,只在LAT变时重算(并失效环影缓存)
const EvapK=0.035,VaporMax=45,CondK=0.0045,DispK=0.001,RainK=0.015,RainHi=42,RainLo=12;
const SnowTemp=1.0,MeltTemp=0.0,MeltK=0.006,VDIFF=0.015,SnowCap=600;
// 水汽温室反馈(Clausius-Clapeyron:暖→饱和水汽压↑→水汽↑→温室↑) + 云反照率(暖→云↑→反射阳光↓→致冷,与水汽打擂台)
const cVapGH=0.045, Vref=14, cVsatT=16, cCloudAlb=0.15;   // cVsatT:饱和水汽温敏(每16℃翻倍≈4.4%/℃);锚定基线水汽Vref→默认地球不变
// 土壤发育/地下水:soilDepth风化造土÷径流剥土;GW深渗补给→旱季基流。pedK造土 erodK剥土 gwRech补给 gwBase基流
const pedWeatherK=2e-4, pedErodeK=8e-5, soilCapBase=18, soilCapPerM=22, gwRechK=0.04, gwBaseK=0.006, gwCap=400;
const csun=C=>1-0.8*C/100,ccool=C=>1-0.6*C/100;
const seaTemp=d=>13+6*Math.sin(2*PI*(d-110)/YEAR);
/* 潮汐：引力梯度 ∝ M/d³ → 太阳潮自动=月亮潮×0.46；月+日半日潮相加 → 大/小潮涌现 */
/* 卫星列表(可多颗,各自周期)：由 质量/距离 推导 潮汐力∝M/d³ 与 视亮度∝半径²/d²(半径∝M^(1/3)) */
const MOONS=[
  {name:'月', mass:7.342e22, distKm:384400, period:29.53, inc:5.14},   // 默认单卫星(inc=轨道倾角,日月食稀有性来源)。加一行即成多卫星系统
];
const _Ksun=1.989e30/Math.pow(1.496e11,3);
MOONS.forEach(o=>{ o.d=o.distKm*1000; o.K=o.mass/Math.pow(o.d,3); o.glow=Math.pow(o.mass,2/3)/(o.d*o.d);
  o.radiusKm=1737*Math.cbrt(o.mass/7.342e22); o.angR=Math.atan(o.radiusKm/o.distKm)*180/PI; });   // 半径∝质量^⅓;视半径(度)→日月食几何
const _ampScale=0.5/MOONS[0].K, _glowScale=4/MOONS[0].glow;    // 标定:主月半日潮振幅≈0.5m、满月夜光≈4
MOONS.forEach(o=>{ o.amp=o.K*_ampScale; o.bright=o.glow*_glowScale; });
/* 行星环(土星式):赤道面粒子盘。inner/outer=内外缘(行星半径单位),opacity=遮光,glow=反照夜光标定。null=无环。
   两个确定性效应,都挂在已有赤纬上:①环影=环在冬半球投影削日照→冬季深寒(分点边缘对日→归零,δ翻号→换半球);②环光=被照亮的环反射到夜半球(夏半球更亮,像月光)。 */
const RING=null;   // 默认地球:无环。土星式环示例:{inner:1.2, outer:2.5, opacity:0.7, glow:9}
function ringShadow(latRad,deRad){    // 该纬度当日日照被环影削减的比例(0~opacity);几何积分,确定性
  if(!RING) return 0; const sz=Math.sin(deRad); if(Math.abs(sz)<1e-3) return 0;   // 分点:环侧对太阳→影成赤道细线≈0
  const sx=Math.cos(deRad); let lit=0,blk=0;
  for(let k=0;k<24;k++){ const lam=(k+0.5)/24*2*PI;
    const px=Math.cos(latRad)*Math.cos(lam), py=Math.cos(latRad)*Math.sin(lam), pz=Math.sin(latRad);
    const mu=px*sx+pz*sz; if(mu<=0) continue; lit+=mu;          // 白昼受照才算
    const t=-pz/sz; if(t<=0) continue;                          // 射线朝太阳侧穿过环面(t>0→冬半球)
    const rho=Math.hypot(px+t*sx, py); if(rho>=RING.inner&&rho<=RING.outer) blk+=mu*RING.opacity; }
  return lit>0?blk/lit:0;
}
function ringShine(latRad,deRad){     // 环反射夜光(接月光量纲):∝环被照亮程度|sinδ|,夏半球看到被照面更多
  if(!RING) return 0; return RING.glow*Math.abs(Math.sin(deRad))*((latRad*deRad>0)?1:0.4);
}

  const W=rect.width||cv.clientWidth||(cv.parentElement&&cv.parentElement.clientWidth)||900; if(W<10) return;   // 兜底:刚display:block未重排时rect.width=0→用父宽,不放弃绘制
  const cx0=cv.getContext('2d');
  if(phylo.length===0){ const H=440; cv.style.height=H+'px'; cv.width=W*dp; cv.height=H*dp; cx0.setTransform(dp,0,0,dp,0,0); cx0.clearRect(0,0,W,H); cx0.fillStyle='#8a96ab'; cx0.font='14px sans-serif'; cx0.fillText('🌱 尚无生命谱系——让世界演化出生命(粗档千年/万年最快),分化后再来看',24,44); phyloHit=[]; return; }
  const now=geoYearN; let minK=1e9,maxK=0; for(const p of phylo){ minK=Math.min(minK,p.bornKy); maxK=Math.max(maxK,p.deathKy<0?now:p.deathKy); } maxK=Math.max(maxK,minK+1);
  const byId={}; for(const p of phylo) byId[p.id]=p;
  const kids={}; for(const p of phylo){ (kids[p.parent]=kids[p.parent]||[]).push(p); } for(const k in kids) kids[k].sort((u,v)=>u.bornKy-v.bornKy);
  const yOf={}; let leaf=0;
  const dfs=node=>{ const ch=kids[node.id]; if(!ch||!ch.length){ yOf[node.id]=leaf++; return yOf[node.id]; } let s=0; for(const c of ch) s+=dfs(c); yOf[node.id]=s/ch.length; return yOf[node.id]; };
  const roots=phylo.filter(p=>p.parent<0||!byId[p.parent]).sort((u,v)=>u.bornKy-v.bornKy); for(const rt of roots) dfs(rt);
  const nLeaf=Math.max(1,leaf), rowH=24, padL=50,padR=158,padT=20,padB=30;
  const H=Math.max(440, padT+padB+nLeaf*rowH);   // 自适应高度:物种越多越高,容器纵向滚动(解决拥挤)
  cv.style.height=H+'px'; cv.width=W*dp; cv.height=H*dp; const cx=cv.getContext('2d'); cx.setTransform(dp,0,0,dp,0,0); cx.clearRect(0,0,W,H);
  const X=ky=>padL+(W-padL-padR)*(ky-minK)/(maxK-minK), Y=i=>padT+nLeaf*rowH*(i+0.5)/nLeaf;   // 行高固定→不挤
  cx.font='11px sans-serif';
  for(let t=0;t<=5;t++){ const ky=minK+(maxK-minK)*t/5, px=X(ky); cx.strokeStyle='#161d29'; cx.beginPath(); cx.moveTo(px,padT); cx.lineTo(px,H-padB); cx.stroke(); cx.fillStyle='#5a6a82'; cx.fillText(ky.toFixed(0)+'ky',px-8,padT+14); cx.fillText(ky.toFixed(0)+'ky',px-8,H-padB+16); }
  for(const me of massExt){ if(me.ky<minK||me.ky>maxK) continue; const px=X(me.ky);   // 大灭绝:红虚线贯穿+竖排成因标签(有名有姓)
    cx.strokeStyle='rgba(225,80,90,.5)'; cx.lineWidth=1.5; cx.setLineDash([2,4]); cx.beginPath(); cx.moveTo(px,padT); cx.lineTo(px,H-padB); cx.stroke(); cx.setLineDash([]);
    cx.save(); cx.translate(px,padT); cx.rotate(Math.PI/2); cx.fillStyle='#ff6b75'; cx.font='10px sans-serif'; cx.fillText('💀 '+me.cause+' '+me.pct+'%',14,-3); cx.restore(); }
  phyloHit=[];
  for(const p of phylo){ if(p.deathKy<0) continue; const x0=X(p.bornKy), x1=X(p.deathKy), yy=Y(yOf[p.id]), par=byId[p.parent];   // 灭绝支系:底层灰细虚线,不标字
    if(par){ cx.strokeStyle='#4a5878'; cx.lineWidth=1; cx.beginPath(); cx.moveTo(x0,Y(yOf[par.id])); cx.lineTo(x0,yy); cx.stroke(); }
    cx.strokeStyle='#5a6a82'; cx.lineWidth=1.2; cx.setLineDash([3,3]); cx.beginPath(); cx.moveTo(x0,yy); cx.lineTo(x1,yy); cx.stroke(); cx.setLineDash([]);
    phyloHit.push({p,y:yy,x0,x1}); }
  for(const p of phylo){ if(p.deathKy>=0) continue; const x0=X(p.bornKy), x1=X(now), yy=Y(yOf[p.id]), par=byId[p.parent], col=locColor(p.loc), hl=phyloHover&&phyloHover.id===p.id;   // 现存:粗地点色线+大点+右对齐大字标签
    if(par){ cx.globalAlpha=0.55; cx.strokeStyle=col; cx.lineWidth=1.4; cx.beginPath(); cx.moveTo(x0,Y(yOf[par.id])); cx.lineTo(x0,yy); cx.stroke(); cx.globalAlpha=1; }
    cx.strokeStyle=col; cx.lineWidth=hl?5:3; cx.beginPath(); cx.moveTo(x0,yy); cx.lineTo(x1,yy); cx.stroke();
    const rad=hl?7:Math.max(3.5,Math.min(8,3+Math.sqrt(curN(p)))); cx.fillStyle=col; cx.beginPath(); cx.arc(x1,yy,rad,0,7); cx.fill();
    cx.fillStyle=hl?'#ffffff':'#dfe8f5'; cx.font=(hl?'bold ':'')+'13px sans-serif'; cx.fillText('#'+p.id+' '+p.loc,x1+10,yy+4);
    phyloHit.push({p,y:yy,x0,x1}); }
  // 图例:地点→色
  let ly=padT+6; cx.font='11px sans-serif'; cx.fillStyle='#5a6a82'; cx.fillText('地点',W-padR+8,ly); ly+=17;
  for(const r of locs){ if(r.cave)continue; cx.fillStyle=locColor(r.name); cx.fillRect(W-padR+8,ly-9,12,12); cx.fillStyle='#9aa6ab'; cx.font='12px sans-serif'; cx.fillText(r.name,W-padR+25,ly); ly+=18; }
  // 首次打开自动滚到最顶部的现存支系,避免因树太高而全部滚出屏幕
  if(!phyloFirstOpen){ phyloFirstOpen=true;
    const aliveYs=phylo.filter(p=>p.deathKy<0&&yOf[p.id]!==undefined).map(p=>Y(yOf[p.id]));
    if(aliveYs.length){ const minY=Math.min(...aliveYs);
      const ov=document.getElementById('phyloOverlay');
      if(ov){ void ov.scrollHeight; ov.scrollTop=Math.max(0,cv.offsetTop+minY-150); } } }
}
function phyloFindHit(mx,my){ let best=null,bd=13; for(const h of phyloHit){ if(mx<h.x0-8 || mx>h.x1+150) continue; const d=Math.abs(my-h.y); if(d<bd){ bd=d; best=h; } } return best?best.p:null; }
function phyloShowTip(clientX,clientY,p){ const tip=document.getElementById('phyloTip'); if(!tip)return;
  if(!p){ tip.style.display='none'; return; }
  const alive=p.deathKy<0;
  tip.innerHTML='<b>支系 #'+p.id+'</b>　'+(alive?'<span style="color:#7fe0a0">●现存</span>':'<span style="color:#8a96ab">○已灭绝/分化</span>')
    +'<br>地点: <b style="color:'+locColor(p.loc)+'">'+p.loc+'</b>'
    +'<br>生态位(体型): '+p.x.toFixed(2)
    +(alive?'<br>生物量: '+curN(p).toFixed(2):'')
    +'<br>亲代: '+(p.parent<0?'起源(无)':'#'+p.parent)
    +'<br>起源: '+p.bornKy+'ky'+(alive?'（活至今 '+geoYearN+'ky）':'　终止: '+p.deathKy+'ky');
  tip.style.display='block'; tip.style.left=Math.min(clientX+14,innerWidth-250)+'px'; tip.style.top=(clientY+14)+'px'; }
function updatePhyloPanels(){
  const tot=phylo.length, alive=phylo.filter(p=>p.deathKy<0).length; let globalSp=0; for(const r of locs){ if(r.life)globalSp+=r.life.length; }
  const sp=document.getElementById('phyloStat'); if(sp) sp.textContent='🌍 全球现存物种 '+globalSp+' · 档案支系 '+tot+'(含已灭绝/分化 '+(tot-alive)+') · 起源 '+phylo.filter(p=>p.parent<0).length+' 次 · 地质 '+geoYearN+'ky';
  let h=''; for(const r of locs){ if(r.life&&r.life.length){ const ls=r.life.slice().sort((a,b)=>b.n-a.n);
    h+='<div><span style="display:inline-block;width:10px;height:10px;border-radius:2px;vertical-align:middle;background:'+locColor(r.name)+';margin-right:6px"></span><b style="color:#cfe0ff">'+r.name+'</b>（'+ls.length+'种）: '+ls.map(l=>'#'+l.id+'·位'+l.x.toFixed(2)+'·量'+l.n.toFixed(1)).join('，')+'</div>'; } }
  const se=document.getElementById('phyloSpecies'); if(se) se.innerHTML=h||'<span style="color:#8a96ab">暂无现存生命（先让世界演化出生命）</span>';
  const ee=document.getElementById('phyloEvents'); if(ee) ee.innerHTML=lineageLog.length?lineageLog.map(e=>'<div>'+e+'</div>').join(''):'<span style="color:#8a96ab">暂无事件</span>';
}
let last=performance.now();
function loop(now){const dt=Math.min((now-last)/1000,0.1);last=now;frame++;if(eruptFx>0)eruptFx--; if(!(phyloOpen&&phyloFreeze)) step(dt);   // 悬停谱系看详情时冻结时间
  if((byk[player].lightning||0)>0.003){boltFx=6;boltSeed=frame;} if(boltFx>0)boltFx--;
  if(phyloOpen&&frame%12===0){ drawPhylo(); updatePhyloPanels(); }   // 谱系视图打开时实时刷新
  drawScene();drawMini();updateUI();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
/* ===== 控件 ===== */
document.getElementById('bPause').onclick=function(){paused=!paused;this.textContent=paused?'▶':'⏸';};
document.querySelectorAll('.spd').forEach(b=>b.onclick=()=>{speedKind=b.dataset.kind; speedRate=+b.dataset.rate; acc=0; document.querySelectorAll('.spd').forEach(x=>x.classList.remove('on'));b.classList.add('on');});
document.getElementById('biome').onchange=e=>{LAT=+e.target.value;resetAll();};
document.getElementById('wtype').onchange=e=>{WORLDTYPE=e.target.value;resetAll();};
document.getElementById('bGeo').onclick=()=>{ for(let i=0;i<90;i++){ geoYear(); if(eruptFx>200) break; } };   // 快进到下次喷发：山长高+灰幕致冷
document.getElementById('bPhylo').onclick=()=>{ phyloOpen=true; phyloFirstOpen=false; document.getElementById('phyloOverlay').style.display='block'; drawPhylo(); updatePhyloPanels(); };
document.getElementById('bPhyloClose').onclick=()=>{ phyloOpen=false; phyloFreeze=false; phyloHover=null; phyloShowTip(0,0,null); document.getElementById('phyloOverlay').style.display='none'; };
(function(){ const pcv=document.getElementById('phyloCanvas');   // 悬停:暂停时间+高亮+详情卡
  pcv.addEventListener('mousemove',e=>{ phyloFreeze=true; const rect=pcv.getBoundingClientRect(); phyloHover=phyloFindHit(e.clientX-rect.left,e.clientY-rect.top); drawPhylo(); phyloShowTip(e.clientX,e.clientY,phyloHover); });
  pcv.addEventListener('mouseleave',()=>{ phyloFreeze=false; phyloHover=null; phyloShowTip(0,0,null); drawPhylo(); }); })();
</script>
