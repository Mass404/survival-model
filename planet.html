<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球气候 · Planet 视图</title>
<style>
  :root{ --bg:#0b1020; --panel:#141b30; --ink:#e8ecf6; --mut:#8a96b3; --line:#26304d; --hi:#5db0ff; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 system-ui,"PingFang SC","Microsoft YaHei",sans-serif}
  header{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
  h1{font-size:17px;margin:0;font-weight:600}
  .sub{color:var(--mut);font-size:13px}
  .wrap{display:flex;gap:16px;padding:16px 18px;flex-wrap:wrap;align-items:flex-start}
  .stage{position:relative;background:#070b18;border:1px solid var(--line);border-radius:10px;padding:8px}
  canvas{display:block;border-radius:6px;cursor:crosshair}
  .side{flex:1;min-width:260px;max-width:420px;display:flex;flex-direction:column;gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .card h2{font-size:13px;margin:0 0 8px;color:var(--mut);font-weight:600;letter-spacing:.04em}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  button{background:#1d2742;color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:6px 11px;cursor:pointer;font-size:13px}
  button:hover{border-color:var(--hi)}
  button.on{background:var(--hi);color:#04122b;border-color:var(--hi);font-weight:600}
  .kv{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed var(--line)}
  .kv:last-child{border-bottom:0}
  .kv b{font-weight:600}
  .legend{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mut);margin-top:8px}
  .bar{height:10px;flex:1;border-radius:5px}
  .pin{color:#ffd75e}
  .hint{color:var(--mut);font-size:12px;margin-top:6px}
  input[type=range]{width:120px}
  a.jump{color:var(--hi);text-decoration:none;border-bottom:1px dashed var(--hi)}
</style>
</head>
<body>
<header>
  <h1>🌍 全球气候 · Planet</h1>
  <span class="sub" id="clock">—</span>
  <span class="sub">2D 经纬网格 · 三圈环流 · 陆海 · 海洋环流（C# Planet 的 JS 镜像）</span>
</header>

<div class="wrap">
  <div class="stage">
    <canvas id="cv" width="720" height="380"></canvas>
  </div>

  <div class="side">
    <div class="card">
      <h2>视图</h2>
      <div class="row" id="views"></div>
      <div class="row" style="margin-top:8px">
        <label><input type="checkbox" id="ckWind" checked> 盛行风</label>
        <label><input type="checkbox" id="ckBelt" checked> 雨带</label>
        <label><input type="checkbox" id="ckNest" checked> 嵌套标记</label>
        <label><input type="checkbox" id="ckOcean"> 全海洋</label>
        <label><input type="checkbox" id="ckRing"> 星环</label>
        <label><input type="checkbox" id="ckFresh"> 融冰淡水</label>
      </div>
      <div class="legend"><span id="lgLo">冷</span><div class="bar" id="lgBar"></div><span id="lgHi">热</span></div>
    </div>

    <div class="card">
      <h2>时间</h2>
      <div class="row">
        <button id="play" class="on">⏸ 暂停</button>
        <button id="reset">↺ 重置</button>
        <label>速度 <input type="range" id="spd" min="1" max="40" value="12"></label>
        <span class="sub" id="spdv"></span>
      </div>
    </div>

    <div class="card">
      <h2>📍 你的局部世界（嵌套点）</h2>
      <div class="kv"><span>位置</span><b id="nLoc">40°N 大陆西岸</b></div>
      <div class="kv"><span>全球气温(此刻)</span><b id="nT">—</b></div>
      <div class="kv"><span>盛行风</span><b id="nW">—</b></div>
      <div class="kv"><span>降水带</span><b id="nP">—</b></div>
      <div class="kv"><span>近海海温(含寒流)</span><b id="nS">—</b></div>
      <div class="kv"><span>陆地气候基准</span><b id="nB">—</b></div>
      <div class="hint">移动纬度滑块 → 换气候带（局部世界随之变冷/变暖）：</div>
      <div class="row" style="margin-top:6px">
        <label>纬度 <input type="range" id="lat" min="-80" max="80" value="40"></label>
        <span class="sub" id="latv">40°N</span>
      </div>
      <div class="hint">点击地图上的 📍 或 <a class="jump" href="world.html">打开局部视图 →</a></div>
    </div>
  </div>
</div>

<script>
// ====================== Planet 模型（C# Planet.StepDay 的 JS 镜像，参数已验证） ==============
const NLat=18, NLon=24, YEAR=365, TILT=23.44, EQX=80;
const LandInertia=0.20, SeaCouple=0.15, Adv=0.18;
const OceanInertia=0.012, OceanHeatMix=0.05, SalRate=0.004, SalMix=0.008, GyreCool=0.08;
const MOCgain=0.8, MOCheat=0.12; let MOC=1, FRESH=0;   // 热盐环流:强度(1=开)+淡水输入(冰融脉冲→停摆)
/* 行星基本参数(变化极慢→当常量)：科里奥利 Ω 由自转推导 */
const PLANET={mass:5.972e24, radiusKm:6371, rotationH:24, starFlux:1.0};   // 默认地球
const _G=6.674e-11, pR=PLANET.radiusKm*1000, pG=_G*PLANET.mass/(pR*pR);    // 重力 g(供读出)
const OMEGA=2*Math.PI/(PLANET.rotationH*3600), FRIC=8e-5, LMIN=120, LMAX=240;  // Ω=2π/自转周期(替换写死的7.29e-5)
const GF=-16, REF=40, LAPSE=6.5/1000;

const latof = j => -90 + (j+0.5)*180/NLat;
const lonof = i => (i+0.5)*360/NLon;
let WATERWORLD=false;   // 全海洋(水世界)测试:清空大陆掩膜
const isLand = i => { if(WATERWORLD) return false; const lo=lonof(i); return lo>=LMIN && lo<=LMAX; };
const decl = d => TILT*Math.sin(2*Math.PI*(d-EQX)/YEAR);
const eqT = (lat,dc) => 30 - 65*(1-Math.cos((lat-dc)*0.9*Math.PI/180));
// 行星环(土星式赤道盘):环影在冬半球削日照→冬季致冷。挂在赤纬dc上,分点(dc≈0)归零,δ翻号换半球。RING_K=全遮时致冷上限
const RING={inner:1.2,outer:2.5,opacity:0.7}, RING_K=22; let RINGON=false;   // 默认地球:无环(勾选「星环」开启)
function ringShadow(latDeg,dDeg){ const sz=Math.sin(dDeg*Math.PI/180); if(Math.abs(sz)<1e-3)return 0;
  const sx=Math.cos(dDeg*Math.PI/180),phi=latDeg*Math.PI/180; let lit=0,blk=0;
  for(let k=0;k<24;k++){ const lam=(k+0.5)/24*2*Math.PI; const px=Math.cos(phi)*Math.cos(lam),py=Math.cos(phi)*Math.sin(lam),pz=Math.sin(phi);
    const mu=px*sx+pz*sz; if(mu<=0)continue; lit+=mu; const t=-pz/sz; if(t<=0)continue;
    const rho=Math.hypot(px+t*sx,py); if(rho>=RING.inner&&rho<=RING.outer) blk+=mu*RING.opacity; }
  return lit>0?blk/lit:0; }
const ringCool=(latDeg,dDeg)=>(RING&&RINGON)?RING_K*ringShadow(latDeg,dDeg):0;
function cellV(lat){ const a=Math.abs(lat), s=lat>=0?1:-1; const v=a<30?-2.0:a<60?2.0:-1.5; return v*s; }
function uband(lat){ return 2*OMEGA*Math.sin(lat*Math.PI/180)*cellV(lat)/FRIC; }
function precipBand(lat,dc){ const d=Math.abs(lat-dc*0.5), a=Math.abs(lat);
  return d<12?1.0 : (a>22&&a<38)?0.1 : (a>=45&&a<68)?0.7 : (a>=78)?0.1 : 0.4; }
let UMAX=1; for(let j=0;j<NLat;j++) UMAX=Math.max(UMAX,Math.abs(uband(latof(j))));

// 年均平衡温（陆地基准源）
const annualMean = lat => { let s=0; for(let d=0;d<YEAR;d++) s+=eqT(lat,decl(d)); return s/YEAR; };
const climBase = lat => GF + (annualMean(lat)-annualMean(REF));

let Land=[], T=[], S=[], SAL=[], P=[], U=[], PR=[], FR=[];   // PR=气压 FR=锋面/斜压
function grid(v){ return Array.from({length:NLat},()=>Array(NLon).fill(v)); }
function init(){
  Land=grid(false); T=grid(0); S=grid(0); SAL=grid(34.5); P=grid(0); U=grid(0); PR=grid(1013); FR=grid(0);
  for(let j=0;j<NLat;j++){ const lat=latof(j);
    for(let i=0;i<NLon;i++){ Land[j][i]=isLand(i); T[j][i]=eqT(lat,0); S[j][i]=Math.max(-2,eqT(lat,0)); }
  }
}
function nearSea(j,i,dc){
  for(let d=1;d<=NLon/2;d++){ const il=((i-d)%NLon+NLon)%NLon, ir=(i+d)%NLon;
    if(!Land[j][il]) return S[j][il]; if(!Land[j][ir]) return S[j][ir]; }
  return Math.max(-2,eqT(latof(j),dc));
}
function stepDay(d){
  const dc=decl(d);
  // 1) 海温 + 盐度
  const s0=S.map(r=>r.slice()), sl0=SAL.map(r=>r.slice());
  for(let j=0;j<NLat;j++){ const jl=Math.max(0,j-1),jr=Math.min(NLat-1,j+1), eqO=Math.max(-2,eqT(latof(j),dc)-ringCool(latof(j),dc));
    for(let i=0;i<NLon;i++){ if(Land[j][i])continue;
      S[j][i]+=OceanInertia*(eqO-s0[j][i])+OceanHeatMix*((s0[jl][i]+s0[jr][i])/2-s0[j][i]);
      const ev=Math.max(0,s0[j][i])/30.0;
      SAL[j][i]+=SalRate*(ev-1.6*precipBand(latof(j),dc))+SalMix*((sl0[jl][i]+sl0[jr][i])/2-sl0[j][i]);
    }}
  // 1b) 热盐环流(MOC):高纬冷+咸→密→下沉驱动;向极输热(暖极)。淡水(冰融)→密度降→下沉停→MOC崩(双稳/滞回)
  { let dens=0,n=0; for(let j=0;j<NLat;j++){ if(Math.abs(latof(j))<50)continue; for(let i=0;i<NLon;i++){ if(Land[j][i])continue; dens+=0.8*(SAL[j][i]-34.5)-0.12*(S[j][i]-10)-FRESH; n++; } }
    const tgt=Math.max(0, n?(dens/n)*MOCgain:0); MOC+=0.05*(tgt-MOC);    // 弛豫→双稳/滞回时间常数
    for(let j=0;j<NLat;j++){ const a=Math.abs(latof(j)); for(let i=0;i<NLon;i++){ if(Land[j][i])continue;
      if(a>=50) S[j][i]+=MOCheat*MOC; else if(a<35) S[j][i]-=MOCheat*MOC*0.5; } } }   // 经向热输送:暖高纬/微凉低纬(守恒)
  // 2) 气温：陆地快弛豫到平衡；海上跟随海温
  for(let j=0;j<NLat;j++){ const eqA=eqT(latof(j),dc)-ringCool(latof(j),dc);
    for(let i=0;i<NLon;i++){ if(Land[j][i]) T[j][i]+=LandInertia*(eqA-T[j][i]); else T[j][i]+=SeaCouple*(S[j][i]-T[j][i]); }}
  // 3) 定向纬向平流 → 大陆性
  const t1=T.map(r=>r.slice());
  for(let j=0;j<NLat;j++){ const u=uband(latof(j)), w=Math.min(1,Math.abs(u)/UMAX), up=u>0?-1:1;
    for(let i=0;i<NLon;i++){ const iu=((i+up)%NLon+NLon)%NLon; T[j][i]+=Adv*w*(t1[j][iu]-t1[j][i]); U[j][i]=u; }}
  // 4) 降水：纬度带 × 季风
  for(let j=0;j<NLat;j++){ const base=precipBand(latof(j),dc);
    for(let i=0;i<NLon;i++){ let p=base;
      if(Land[j][i]){ const dT=T[j][i]-nearSea(j,i,dc); p*=1+0.5*Math.max(0,Math.min(1,dT/8))-0.4*Math.max(0,Math.min(1,-dT/8)); }
      P[j][i]=Math.max(0,Math.min(1.2,p)); }}
  // 5) 西岸寒流（副热带、东邻为陆的海格）
  for(let j=0;j<NLat;j++){ const a=Math.abs(latof(j)); if(a<18||a>42)continue;
    for(let i=0;i<NLon;i++){ if(Land[j][i])continue; if(Land[j][(i+1)%NLon]) S[j][i]-=GyreCool; }}
  // 6) 气压：环流气压带(赤道低/副热带高/副极地低/极地高) + 热力异常(暖→低,冷→高)
  const PBELT=20,PKT=2.0;
  for(let j=0;j<NLat;j++){ const belt=-PBELT*Math.cos(2*Math.PI*Math.abs(latof(j))/60);
    let m=0; for(let i=0;i<NLon;i++)m+=T[j][i]; m/=NLon;
    for(let i=0;i<NLon;i++) PR[j][i]=1013+belt-PKT*(T[j][i]-m); }
  // 7) 锋面/风暴轴：经向温度梯度(中纬斜压带)
  for(let j=0;j<NLat;j++){ const jl=Math.max(0,j-1),jr=Math.min(NLat-1,j+1);
    for(let i=0;i<NLon;i++) FR[j][i]=Math.abs(T[jr][i]-T[jl][i])/2; }
}
function bilerp(f,lat,lon){
  lon=((lon%360)+360)%360;
  let xj=(lat+90)/180*NLat-0.5, j0=Math.floor(xj), tj=xj-j0; j0=Math.max(0,Math.min(NLat-1,j0)); let j1=Math.max(0,Math.min(NLat-1,j0+1));
  let xi=lon/360*NLon-0.5, i0=Math.floor(xi), ti=xi-i0; i0=((i0%NLon)+NLon)%NLon; let i1=(i0+1)%NLon;
  const a=f[j0][i0]+(f[j0][i1]-f[j0][i0])*ti, b=f[j1][i0]+(f[j1][i1]-f[j1][i0])*ti; return a+(b-a)*tj;
}

// ====================== 着色 ======================
function lerp(a,b,t){return a+(b-a)*t;}
function mix(c1,c2,t){return [Math.round(lerp(c1[0],c2[0],t)),Math.round(lerp(c1[1],c2[1],t)),Math.round(lerp(c1[2],c2[2],t))];}
function ramp(stops,t){ t=Math.max(0,Math.min(1,t)); const n=stops.length-1; const x=t*n; const i=Math.min(n-1,Math.floor(x)); return mix(stops[i],stops[i+1],x-i); }
const TEMP=[[20,40,120],[40,120,200],[90,190,220],[120,200,150],[235,220,120],[235,150,60],[200,50,40]];
const PREC=[[150,110,70],[180,160,90],[120,190,110],[70,170,170],[40,110,200]];
const SALT=[[225,235,230],[120,200,190],[20,120,140],[10,60,100]];
function tcol(v){ return ramp(TEMP,(v+40)/80); }
function pcol(p){ const t=Math.max(-1,Math.min(1,(p-1013)/28)); return t<0?mix([245,248,252],[60,90,200],-t):mix([245,248,252],[210,70,60],t); }  // 低压蓝·高压红
function rgb(c){return `rgb(${c[0]},${c[1]},${c[2]})`;}

// ====================== 渲染 ======================
const cv=document.getElementById('cv'), cx=cv.getContext('2d');
const W=cv.width, H=cv.height, CW=W/NLon, CH=H/NLat;
let view='temp';
function cellColor(j,i){
  if(view==='temp') return tcol(T[j][i]);
  if(view==='prec') return Land[j][i]||true ? ramp(PREC,P[j][i]/1.2) : [20,30,50];
  if(view==='sst')  return Land[j][i] ? [22,28,46] : tcol(S[j][i]);
  if(view==='press') return pcol(PR[j][i]);
  if(view==='sal')  return Land[j][i] ? [22,28,46] : ramp(SALT,(SAL[j][i]-32)/3.5);
  return [0,0,0];
}
// 板块构造：地幔对流(2胞)→板块速度→汇聚度(-d v/d lon)
const tVp=lon=>Math.sin(2*Math.PI*2*lon/360);
const tConv=lon=>{const h=0.5;return -(tVp(lon+h)-tVp(lon-h))/(2*h);};
function draw(){
  for(let j=0;j<NLat;j++) for(let i=0;i<NLon;i++){
    const y=(NLat-1-j)*CH; // 北在上
    cx.fillStyle=rgb(cellColor(j,i)); cx.fillRect(i*CW,y,CW+0.5,CH+0.5);
    if(Land[j][i] && (view==='temp'||view==='prec')){ cx.strokeStyle='rgba(0,0,0,.15)'; }
  }
  // 大陆轮廓
  cx.strokeStyle='rgba(255,255,255,.45)'; cx.lineWidth=1.5;
  for(let j=0;j<NLat;j++) for(let i=0;i<NLon;i++){ if(!Land[j][i])continue; const y=(NLat-1-j)*CH;
    if(!isLand((i-1+NLon)%NLon)) cx.strokeRect(i*CW,y,0.01,CH);
    if(!isLand((i+1)%NLon))      { cx.beginPath();cx.moveTo((i+1)*CW,y);cx.lineTo((i+1)*CW,y+CH);cx.stroke(); }
  }
  // 雨带（ITCZ + 高雨区）
  if(document.getElementById('ckBelt').checked){
    for(let j=0;j<NLat;j++) for(let i=0;i<NLon;i++){ if(P[j][i]<0.6)continue; const y=(NLat-1-j)*CH;
      cx.fillStyle=`rgba(90,160,255,${Math.min(.5,(P[j][i]-0.5)*0.6)})`; cx.fillRect(i*CW,y,CW,CH);
      if(P[j][i]>0.9){ cx.fillStyle='rgba(180,210,255,.9)'; for(let k=0;k<2;k++){const rx=i*CW+Math.random()*CW,ry=y+Math.random()*CH;cx.fillRect(rx,ry,1,3);} }
    }
  }
  // 盛行风箭头（每行中部几列）
  if(document.getElementById('ckWind').checked){
    cx.strokeStyle='rgba(255,255,255,.7)'; cx.fillStyle='rgba(255,255,255,.7)'; cx.lineWidth=1.4;
    for(let j=0;j<NLat;j+=1){ const u=uband(latof(j)); if(Math.abs(u)<0.4)continue; const y=(NLat-1-j)*CH+CH/2;
      for(let i=2;i<NLon;i+=5){ const x=i*CW+CW/2; const len=Math.min(CW*1.2,6+Math.abs(u)*1.5)*(u>0?1:-1); arrow(x-len/2,y,x+len/2,y); }
    }
  }
  // 副热带西岸寒流（青色短舌）
  if(view==='sst'||view==='temp'){
    cx.strokeStyle='rgba(120,230,255,.9)'; cx.lineWidth=2.5;
    for(let j=0;j<NLat;j++){ const a=Math.abs(latof(j)); if(a<18||a>42)continue;
      for(let i=0;i<NLon;i++){ if(Land[j][i])continue; if(Land[j][(i+1)%NLon]){ const y=(NLat-1-j)*CH; cx.beginPath();cx.moveTo((i+1)*CW-1,y+2);cx.lineTo((i+1)*CW-1,y+CH-2);cx.stroke(); }}
    }
  }
  // 纬度刻度
  cx.fillStyle='rgba(255,255,255,.55)'; cx.font='10px system-ui';
  [60,30,0,-30,-60].forEach(L=>{ const y=(90-L)/180*H; cx.fillText((L>0?L+'°N':L<0?(-L)+'°S':'赤道'),3,y-2); cx.strokeStyle='rgba(255,255,255,.12)';cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke(); });
  // 板块边界(底边)：地幔对流→汇聚▲(俯冲/造山,红) / 离散▽(洋脊/裂谷,蓝)
  cx.font='11px system-ui'; cx.textAlign='center';
  for(let i=0;i<NLon;i++){ const c=tConv(lonof(i)), x=(i+0.5)*CW, y=H-4;
    if(c>0.005){cx.fillStyle='#e8604a';cx.fillText('▲',x,y);}
    else if(c<-0.005){cx.fillStyle='#5bbef0';cx.fillText('▽',x,y);} }
  cx.textAlign='left';
  // 嵌套标记
  if(document.getElementById('ckNest').checked){
    const x=(nestLon/360)*W, y=(90-nestLat)/180*H;
    cx.font='18px system-ui'; cx.textAlign='center'; cx.fillText('📍',x,y+6); cx.textAlign='left';
    cx.fillStyle='#ffd75e'; cx.font='11px system-ui'; cx.fillText('你的世界',x-22,y-10);
  }
}
function arrow(x1,y1,x2,y2){ cx.beginPath();cx.moveTo(x1,y1);cx.lineTo(x2,y2);cx.stroke(); const dir=x2>x1?1:-1; cx.beginPath();cx.moveTo(x2,y2);cx.lineTo(x2-4*dir,y2-2);cx.lineTo(x2-4*dir,y2+2);cx.closePath();cx.fill(); }

// ====================== 状态 / 循环 ======================
let day=0, playing=true, nestLat=40, nestLon=125;
function spinUp(){ init(); for(let d=0; d<3*YEAR; d++) stepDay(d%YEAR); day=0; }
function updatePanel(){
  const dc=decl(day);
  document.getElementById('clock').textContent = `第 ${day} 天 · ${seasonName(day)} · 直射点 ${dc>=0?'+':''}${dc.toFixed(1)}°`;
  const T0=bilerp(T,nestLat,nestLon), Uu=bilerp(U,nestLat,nestLon), Pp=bilerp(P,nestLat,nestLon), Ss=bilerp(S,nestLat,nestLon);
  document.getElementById('nLoc').textContent=`${Math.abs(nestLat)}°${nestLat>=0?'N':'S'} 大陆西岸`;
  document.getElementById('nT').textContent=`${T0.toFixed(1)}°C`;
  document.getElementById('nW').textContent=windName(Uu);
  document.getElementById('nP').textContent=Pp>0.8?'多雨':Pp<0.2?'干旱(副高/极地)':'中等';
  document.getElementById('nS').textContent=`${Ss.toFixed(1)}°C`;
  document.getElementById('nB').textContent=`${climBase(nestLat).toFixed(1)} (海平面年均锚)`;
}
function seasonName(d){ const q=((d-EQX+YEAR)%YEAR)*4/YEAR|0; return ['🌱 春','☀️ 夏','🍂 秋','❄️ 冬'][q]; }
function windName(u){ return u>0.5?'西风':u<-0.5?'东风(信风)':'弱'; }

let last=0, daysPerSec=12;
function loop(ts){
  if(playing){ const dt=(ts-last)/1000; last=ts; const adv=Math.max(1,Math.round(dt*daysPerSec));
    for(let k=0;k<adv;k++){ stepDay(day%YEAR); day++; }
  } else last=ts;
  draw(); updatePanel(); requestAnimationFrame(loop);
}

// ====================== 控件 ======================
const VIEWS=[['temp','气温带'],['press','气压'],['prec','降水'],['sst','海温'],['sal','盐度']];
const vbox=document.getElementById('views');
VIEWS.forEach(([k,label])=>{ const b=document.createElement('button'); b.textContent=label; b.dataset.v=k; if(k==='temp')b.classList.add('on');
  b.onclick=()=>{ view=k; [...vbox.children].forEach(c=>c.classList.toggle('on',c.dataset.v===k)); setLegend(); }; vbox.appendChild(b); });
function setLegend(){
  const bar=document.getElementById('lgBar'), lo=document.getElementById('lgLo'), hi=document.getElementById('lgHi');
  let stops,a,b;
  if(view==='temp'||view==='sst'){stops=TEMP;a='-40°C';b='+40°C';}
  else if(view==='press'){stops=[[60,90,200],[245,248,252],[210,70,60]];a='低压';b='高压';}
  else if(view==='prec'){stops=PREC;a='干';b='多雨';}
  else {stops=SALT;a='32';b='35.5 psu';}
  bar.style.background=`linear-gradient(90deg,${stops.map(c=>rgb(c)).join(',')})`; lo.textContent=a; hi.textContent=b;
}
document.getElementById('play').onclick=function(){ playing=!playing; this.textContent=playing?'⏸ 暂停':'▶ 播放'; this.classList.toggle('on',playing); };
document.getElementById('reset').onclick=()=>{ spinUp(); };
document.getElementById('spd').oninput=function(){ daysPerSec=+this.value; document.getElementById('spdv').textContent=`${daysPerSec} 天/秒`; };
document.getElementById('lat').oninput=function(){ nestLat=+this.value; document.getElementById('latv').textContent=`${Math.abs(nestLat)}°${nestLat>=0?'N':'S'}`; };
['ckWind','ckBelt','ckNest'].forEach(id=>document.getElementById(id).onchange=draw);
document.getElementById('ckOcean').onchange=function(){ WATERWORLD=this.checked; spinUp(); };
document.getElementById('ckRing').onchange=function(){ RINGON=this.checked; spinUp(); };
document.getElementById('ckFresh').onchange=function(){ FRESH=this.checked?1.4:0; };   // 淡水脉冲→看MOC实时停摆(不重置,弛豫演化)
cv.addEventListener('click',e=>{ const r=cv.getBoundingClientRect(); const x=(e.clientX-r.left)/r.width*W, y=(e.clientY-r.top)/r.height*H;
  const px=(nestLon/360)*W, py=(90-nestLat)/180*H; if(Math.hypot(x-px,y-py)<18){ window.location.href='world.html'; } });

document.getElementById('spdv').textContent='12 天/秒';
setLegend(); spinUp(); requestAnimationFrame(loop);
</script>
</body>
